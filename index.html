<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #ffffff;
            --text: #37352f;
            --accent: #007aff;
            --secondary: #f4f4f4;
            --danger: #ff5e5e;
            --radius: 10px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #191919;
                --text: #ffffff;
                --accent: #2eaadc;
                --secondary: #252525;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-x: hidden; 
            box-sizing: border-box;
        }

        h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0 0 4px 0;
            opacity: 0.5;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex-grow: 1;
            border: none;
            background: var(--secondary);
            color: inherit;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 0 2px var(--accent);
        }

        button.add-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 0 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button.add-btn:active { transform: scale(0.95); }

        ul { list-style: none; padding: 0; margin: 0; }

        li {
            display: flex;
            align-items: center;
            background: var(--secondary);
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: var(--radius);
            animation: pop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .task-text {
            flex-grow: 1;
            margin: 0 10px;
            font-size: 14px;
        }

        .completed .task-text {
            text-decoration: line-through;
            opacity: 0.4;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 16px;
            opacity: 0.4;
            padding: 4px;
        }

        li:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body>

    <h3>Weekly Goals</h3>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Add a weekly goal..." autocomplete="off">
        <button class="add-btn" onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>

    <script>
        const taskList = document.getElementById('taskList');
        const taskInput = document.getElementById('taskInput');

        // Key name for local storage
        const STORAGE_KEY = 'weekly_goals_list';

        function loadTasks() {
            // Simply retrieve and display, no date check needed
            const goals = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            taskList.innerHTML = '';
            
            goals.forEach((goal, index) => {
                const li = document.createElement('li');
                if (goal.completed) li.classList.add('completed');
                
                li.innerHTML = `
                    <input type="checkbox" ${goal.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                    <span class="task-text">${goal.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
                `;
                taskList.appendChild(li);
            });
        }

        function addTask() {
            const val = taskInput.value.trim();
            if (!val) return;
            const goals = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            goals.push({ text: val, completed: false });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
            taskInput.value = '';
            loadTasks();
        }

        function toggleTask(index) {
            const goals = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            goals[index].completed = !goals[index].completed;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
            loadTasks();
        }

        function deleteTask(index) {
            let goals = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            goals.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
            loadTasks();
        }

        taskInput.addEventListener("keypress", (e) => { 
            if (e.key === "Enter") addTask(); 
        });

        // Initial Load
        loadTasks();
    </script>
</body>
</html>
